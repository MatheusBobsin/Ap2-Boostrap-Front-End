<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabores do Mundo - Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex flex-column min-vh-100" style="background-color: #fdfbf7;">

    <header class="w-100 p-3 shadow-sm" style="z-index: 3; background-color: #8b263e;">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-outline-light fw-bold" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral" style="border-color: #ffca3a; color: #ffca3a;">
                ☰ Menu
            </button>
            
            <a class="text-white text-decoration-none fw-bold fs-4" href="index.html">Sabores do Mundo</a>
        </div>
    </header>

    <nav class="offcanvas offcanvas-start bg-white shadow" tabindex="-1" id="menuLateral" style="width: 250px;">
        <div class="offcanvas-header d-flex justify-content-between align-items-center px-3 mt-2">
            <h5 class="offcanvas-title fw-bold" style="color: #8b263e;">Navegação do Portal</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-3">
            <div class="list-group">
                <a href="index.html" class="list-group-item list-group-item-action" style="color: #212529;">Início</a>
                <a href="galeria.html" class="list-group-item list-group-item-action">Ver Receitas</a>
                <a href="contato.html" class="list-group-item list-group-item-action active" style="background-color: #8b263e; border-color: #8b263e;">Sugerir Receita / Contato</a>
            </div>
            
            <div class="mt-4 px-2">
                <p class="fw-bold mb-1 text-muted small text-uppercase">Categorias Rápidas</p>
                <div class="border-top pt-2">
                    <a href="galeria.html" class="d-block text-decoration-none py-1 text-dark">🍕 Massas e Salgados</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <section class="col-12 col-md-8 col-lg-6">
            <article class="card shadow border-0 p-4" style="background-color: #fff; border-radius: 8px;">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1" style="color: #8b263e;">Sugira sua Receita</h2>
                    <p class="text-muted small">Preencha os campos abaixo para submeter sua criação gastronômica</p>
                </div>
                
                <form action="contato.html" method="GET">
                    <div class="mb-3">
                        <label for="nome" class="form-label fw-semibold text-secondary">Nome Completo</label>
                        <input type="text" class="form-control" id="nome" name="nome" required placeholder="Ex: Maria Silva">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold text-secondary">Seu E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="nome@exemplo.com">
                    </div>
                    <div class="mb-3">
                        <label for="mensagem" class="form-label fw-semibold text-secondary">Ingredientes e Modo de Preparo</label>
                        <textarea class="form-control" id="mensagem" name="mensagem" rows="5" required placeholder="Escreva o passo a passo de forma detalhada..."></textarea>
                    </div>
                    <button type="submit" class="btn w-100 py-2 fw-bold mt-2 shadow-sm text-white" style="background-color: #d84a26; border: none;">Enviar para Avaliação</button>
                </form>
            </article>
        </section>
    </main>

    <footer class="text-white text-center py-3 mt-auto" style="z-index: 2; background-color: #2b1c1f;">
        <div class="container">
            <small>Projeto desenvolvido para AP2 ULBRA.</small>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
